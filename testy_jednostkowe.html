<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Space Invaders — Testy Jednostkowe</title>
  <style>
    body { font-family: "Courier New", monospace; background: #0a0a0f; color: #fff; padding: 20px; }
    h1 { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    h2 { color: #00ccff; margin-top: 30px; }
    .suite { background: #111; border: 1px solid #222; border-radius: 8px; padding: 16px; margin: 16px 0; }
    .test { padding: 6px 12px; margin: 4px 0; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
    .pass { background: rgba(0,255,136,0.1); border-left: 4px solid #00ff88; color: #00ff88; }
    .fail { background: rgba(255,107,107,0.1); border-left: 4px solid #ff6b6b; color: #ff6b6b; }
    .icon { font-size: 1.1rem; }
    .desc { flex: 1; }
    .detail { font-size: 0.8rem; opacity: 0.7; margin-left: auto; }
    #summary { margin-top: 30px; padding: 20px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; }
    .summary-pass { background: rgba(0,255,136,0.15); border: 2px solid #00ff88; color: #00ff88; }
    .summary-fail { background: rgba(255,107,107,0.15); border: 2px solid #ff6b6b; color: #ff6b6b; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-left: 8px; background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<h1>🧪 Space Invaders — Testy Jednostkowe</h1>
<p style="color:#888">Framework: własny mini-runner (bez zewnętrznych bibliotek) | Wersja gry: 0.6.3</p>

<div id="results"></div>
<div id="summary"></div>

<script>
// ============================================================
//  MINI TEST RUNNER
// ============================================================
const testResults = [];

function describe(suiteName, fn) {
  const suite = { name: suiteName, tests: [] };
  currentSuite = suite;
  fn();
  testResults.push(suite);
}

let currentSuite = null;

function it(desc, fn) {
  try {
    fn();
    currentSuite.tests.push({ desc, pass: true });
  } catch (e) {
    currentSuite.tests.push({ desc, pass: false, error: e.message });
  }
}

function expect(val) {
  return {
    toBe(expected) {
      if (val !== expected) throw new Error(`Oczekiwano: ${JSON.stringify(expected)}, otrzymano: ${JSON.stringify(val)}`);
    },
    toEqual(expected) {
      if (JSON.stringify(val) !== JSON.stringify(expected))
        throw new Error(`Oczekiwano: ${JSON.stringify(expected)}, otrzymano: ${JSON.stringify(val)}`);
    },
    toBeGreaterThan(n) {
      if (!(val > n)) throw new Error(`Oczekiwano wartości > ${n}, otrzymano: ${val}`);
    },
    toBeLessThan(n) {
      if (!(val < n)) throw new Error(`Oczekiwano wartości < ${n}, otrzymano: ${val}`);
    },
    toBeGreaterThanOrEqual(n) {
      if (!(val >= n)) throw new Error(`Oczekiwano wartości >= ${n}, otrzymano: ${val}`);
    },
    toBeLessThanOrEqual(n) {
      if (!(val <= n)) throw new Error(`Oczekiwano wartości <= ${n}, otrzymano: ${val}`);
    },
    toBeTruthy() {
      if (!val) throw new Error(`Oczekiwano wartości truthy, otrzymano: ${val}`);
    },
    toBeFalsy() {
      if (val) throw new Error(`Oczekiwano wartości falsy, otrzymano: ${val}`);
    },
    toBeNull() {
      if (val !== null) throw new Error(`Oczekiwano null, otrzymano: ${val}`);
    },
    toBeOneOf(arr) {
      if (!arr.includes(val)) throw new Error(`Wartość ${val} nie należy do [${arr.join(', ')}]`);
    },
    toMatch(regex) {
      if (!regex.test(String(val))) throw new Error(`"${val}" nie pasuje do wzorca ${regex}`);
    }
  };
}

// ============================================================
//  WYIZOLOWANE FUNKCJE Z GRY (kopie logiki do testów)
// ============================================================

// --- Stałe ---
const PLAYER_SPEED_BASE = 2.5;
const PLAYER_WIDTH = 60;
const PLAYER_HEIGHT = 60;
const BULLET_SPEED = 5;
const BULLET_WIDTH = 4;
const BULLET_HEIGHT = 15;
const ENEMY_SPEED_BASE = 0.8;
const ENEMY_WIDTH = 50;
const ENEMY_HEIGHT = 40;
const ENEMY_SPAWN_INTERVAL_BASE = 2000;
const ENEMY_BULLET_SPEED = 3;
const ENEMY_BULLET_WIDTH = 4;
const ENEMY_BULLET_HEIGHT = 12;
const MAX_LIVES = 3;
const POWERUP_DURATION = 8000;
const POWERUP_DROP_CHANCE = 0.3;
const POWERUP_SPEED = 1.5;
const POWERUP_WIDTH = 30;
const POWERUP_HEIGHT = 30;
const HITS_PER_LIFE = 2;

// --- Funkcje logiki gry (wyizolowane) ---

function rectsOverlap(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

function clampPlayerX(x, canvasWidth) {
  return Math.max(0, Math.min(x, canvasWidth - PLAYER_WIDTH));
}

function getDifficultyMultiplier(score) {
  return 1 + (score / 50) * 0.15;
}

function getNewEnemySpeed(score) {
  return ENEMY_SPEED_BASE * getDifficultyMultiplier(score);
}

function getNewSpawnInterval(score) {
  const mult = getDifficultyMultiplier(score);
  return Math.max(500, ENEMY_SPAWN_INTERVAL_BASE / mult);
}

function getRandomEnemyType() {
  const r = Math.random();
  if (r < 0.4) return 'normal';
  if (r < 0.6) return 'fast';
  if (r < 0.8) return 'tank';
  return 'zigzag';
}

const ENEMY_TYPES = {
  normal:  { speedMult: 1,   hp: 1, points: 10 },
  fast:    { speedMult: 2.2, hp: 1, points: 15 },
  tank:    { speedMult: 0.5, hp: 3, points: 30 },
  zigzag:  { speedMult: 1,   hp: 1, points: 20 }
};

const PLAYER_SKINS = ['classic','phoenix','stealth','crystal'];

function getHighScore(stored) {
  const parsed = parseInt(stored);
  return isNaN(parsed) ? 0 : parsed;
}

function updateHighScore(currentScore, currentHigh) {
  return currentScore > currentHigh ? currentScore : currentHigh;
}

// ============================================================
//  TESTY
// ============================================================

// SUITE 1 — Kolizje
describe('🎯 Kolizje (rectsOverlap)', () => {

  it('zwraca true gdy prostokąty się nakładają', () => {
    const a = { left: 0, right: 50, top: 0, bottom: 40 };
    const b = { left: 25, right: 75, top: 20, bottom: 60 };
    expect(rectsOverlap(a, b)).toBe(true);
  });

  it('zwraca false gdy prostokąty nie stykają się (poziomo)', () => {
    const a = { left: 0, right: 40, top: 0, bottom: 40 };
    const b = { left: 50, right: 90, top: 0, bottom: 40 };
    expect(rectsOverlap(a, b)).toBe(false);
  });

  it('zwraca false gdy prostokąty nie stykają się (pionowo)', () => {
    const a = { left: 0, right: 50, top: 0, bottom: 30 };
    const b = { left: 0, right: 50, top: 40, bottom: 70 };
    expect(rectsOverlap(a, b)).toBe(false);
  });

  it('zwraca true gdy jeden prostokąt zawiera się w drugim', () => {
    const a = { left: 10, right: 40, top: 10, bottom: 30 };
    const b = { left: 0, right: 50, top: 0, bottom: 40 };
    expect(rectsOverlap(a, b)).toBe(true);
  });

  it('zwraca true gdy prostokąty stykają się krawędzią', () => {
    const a = { left: 0, right: 50, top: 0, bottom: 40 };
    const b = { left: 50, right: 100, top: 0, bottom: 40 };
    // right === left → NOT strictly apart, rectsOverlap returns true (touching)
    expect(rectsOverlap(a, b)).toBe(true);
  });

});

// SUITE 2 — Ruch gracza
describe('🚀 Ruch gracza (clampPlayerX)', () => {
  const canvasWidth = 800;

  it('pozwala na normalne przesunięcie w granicach planszy', () => {
    expect(clampPlayerX(300, canvasWidth)).toBe(300);
  });

  it('nie pozwala wyjść poza lewą krawędź (x < 0)', () => {
    expect(clampPlayerX(-20, canvasWidth)).toBe(0);
  });

  it('nie pozwala wyjść poza prawą krawędź', () => {
    expect(clampPlayerX(800, canvasWidth)).toBe(canvasWidth - PLAYER_WIDTH);
  });

  it('poprawnie oblicza maksymalną pozycję x', () => {
    expect(clampPlayerX(9999, canvasWidth)).toBe(canvasWidth - PLAYER_WIDTH);
  });

  it('pozycja 0 jest prawidłowa (lewa krawędź)', () => {
    expect(clampPlayerX(0, canvasWidth)).toBe(0);
  });
});

// SUITE 3 — Trudność gry
describe('📈 Skalowanie trudności', () => {

  it('mnożnik trudności wynosi 1 przy score = 0', () => {
    expect(getDifficultyMultiplier(0)).toBe(1);
  });

  it('mnożnik rośnie wraz ze wzrostem punktów', () => {
    expect(getDifficultyMultiplier(100)).toBeGreaterThan(getDifficultyMultiplier(0));
  });

  it('prędkość wrogów rośnie wraz ze wzrostem punktów', () => {
    expect(getNewEnemySpeed(200)).toBeGreaterThan(getNewEnemySpeed(0));
  });

  it('prędkość wrogów przy score=0 równa ENEMY_SPEED_BASE', () => {
    expect(getNewEnemySpeed(0)).toBe(ENEMY_SPEED_BASE);
  });

  it('interwał spawnu maleje wraz ze wzrostem punktów', () => {
    expect(getNewSpawnInterval(200)).toBeLessThan(getNewSpawnInterval(0));
  });

  it('interwał spawnu nigdy nie spada poniżej 500ms', () => {
    // Przy bardzo dużym score
    expect(getNewSpawnInterval(100000)).toBeGreaterThanOrEqual(500);
  });
});

// SUITE 4 — Typy wrogów
describe('👾 Typy wrogów', () => {

  it('wróg normal ma 1 HP i daje 10 pkt', () => {
    expect(ENEMY_TYPES.normal.hp).toBe(1);
    expect(ENEMY_TYPES.normal.points).toBe(10);
  });

  it('wróg fast ma mnożnik prędkości > 1', () => {
    expect(ENEMY_TYPES.fast.speedMult).toBeGreaterThan(1);
  });

  it('wróg tank ma 3 HP i jest najwolniejszy', () => {
    expect(ENEMY_TYPES.tank.hp).toBe(3);
    expect(ENEMY_TYPES.tank.speedMult).toBeLessThan(1);
  });

  it('wróg tank daje najwięcej punktów', () => {
    const points = Object.values(ENEMY_TYPES).map(t => t.points);
    expect(ENEMY_TYPES.tank.points).toBe(Math.max(...points));
  });

  it('getRandomEnemyType zwraca jeden z 4 typów', () => {
    const valid = ['normal','fast','tank','zigzag'];
    for (let i = 0; i < 50; i++) {
      expect(getRandomEnemyType()).toBeOneOf(valid);
    }
  });

  it('wróg zigzag ma 1 HP i daje 20 pkt', () => {
    expect(ENEMY_TYPES.zigzag.hp).toBe(1);
    expect(ENEMY_TYPES.zigzag.points).toBe(20);
  });
});

// SUITE 5 — Punktacja i High Score
describe('🏆 Punktacja i High Score', () => {

  it('getHighScore zwraca 0 gdy brak zapisu', () => {
    expect(getHighScore(null)).toBe(0);
    expect(getHighScore(undefined)).toBe(0);
    expect(getHighScore('abc')).toBe(0);
  });

  it('getHighScore poprawnie parsuje liczby', () => {
    expect(getHighScore('350')).toBe(350);
    expect(getHighScore('0')).toBe(0);
  });

  it('updateHighScore zastępuje wynik gdy nowy jest większy', () => {
    expect(updateHighScore(500, 300)).toBe(500);
  });

  it('updateHighScore nie zmienia gdy nowy wynik jest mniejszy', () => {
    expect(updateHighScore(100, 300)).toBe(300);
  });

  it('updateHighScore zwraca ten sam wynik przy remisie', () => {
    expect(updateHighScore(300, 300)).toBe(300);
  });
});

// SUITE 6 — Stałe i konfiguracja
describe('⚙️ Stałe i konfiguracja gry', () => {

  it('MAX_LIVES wynosi 3', () => {
    expect(MAX_LIVES).toBe(3);
  });

  it('HITS_PER_LIFE wynosi 2', () => {
    expect(HITS_PER_LIFE).toBe(2);
  });

  it('POWERUP_DROP_CHANCE jest w zakresie (0, 1)', () => {
    expect(POWERUP_DROP_CHANCE).toBeGreaterThan(0);
    expect(POWERUP_DROP_CHANCE).toBeLessThan(1);
  });

  it('POWERUP_DURATION > 0', () => {
    expect(POWERUP_DURATION).toBeGreaterThan(0);
  });

  it('BULLET_SPEED > ENEMY_BULLET_SPEED (gracz strzela szybciej)', () => {
    expect(BULLET_SPEED).toBeGreaterThan(ENEMY_BULLET_SPEED);
  });

  it('ENEMY_SPAWN_INTERVAL_BASE wynosi 2000ms', () => {
    expect(ENEMY_SPAWN_INTERVAL_BASE).toBe(2000);
  });

  it('dostępne są 4 skórki statku', () => {
    expect(PLAYER_SKINS.length).toBe(4);
  });
});

// ============================================================
//  RENDER WYNIKÓW
// ============================================================
let totalPass = 0, totalFail = 0;
const container = document.getElementById('results');

testResults.forEach(suite => {
  const suitePass = suite.tests.filter(t => t.pass).length;
  const suiteFail = suite.tests.filter(t => !t.pass).length;
  totalPass += suitePass;
  totalFail += suiteFail;

  const suiteDiv = document.createElement('div');
  suiteDiv.className = 'suite';

  const title = document.createElement('h2');
  title.innerHTML = `${suite.name} <span class="badge" style="color:#00ff88">${suitePass} ✓</span>${suiteFail ? `<span class="badge" style="color:#ff6b6b">${suiteFail} ✗</span>` : ''}`;
  suiteDiv.appendChild(title);

  suite.tests.forEach(test => {
    const div = document.createElement('div');
    div.className = `test ${test.pass ? 'pass' : 'fail'}`;
    div.innerHTML = `
      <span class="icon">${test.pass ? '✅' : '❌'}</span>
      <span class="desc">${test.desc}</span>
      ${!test.pass ? `<span class="detail">${test.error}</span>` : ''}
    `;
    suiteDiv.appendChild(div);
  });

  container.appendChild(suiteDiv);
});

const summary = document.getElementById('summary');
const allPass = totalFail === 0;
summary.className = `suite ${allPass ? 'summary-pass' : 'summary-fail'}`;
summary.innerHTML = `
  ${allPass ? '✅' : '⚠️'} Wynik: <strong>${totalPass} / ${totalPass + totalFail}</strong> testów zaliczonych
  ${totalFail > 0 ? `| <span style="color:#ff6b6b">${totalFail} nieudanych</span>` : '| Wszystkie testy przeszły pomyślnie 🎉'}
`;
</script>
</body>
</html>

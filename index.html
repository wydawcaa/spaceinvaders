<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="stars" id="stars"></div>

  <div class="container">
    <h1 class="game-title">SPACE INVADERS</h1>

    <div class="game-window">
      <div class="game-canvas" id="gameCanvas">
        <!-- HUD -->
        <div class="hud-top">
          <div class="lives-display" id="livesDisplay" style="display: none;">❤️❤️❤️</div>
          <div class="score-display" id="scoreDisplay" style="display: none;">Score: 0</div>
          <div class="highscore-display" id="highScoreDisplay" style="display: none;">Best: 0</div>
        </div>
        <div class="powerup-indicators" id="powerupIndicators" style="display: none;"></div>

        <!-- Game Over Overlay -->
        <div class="game-over-overlay" id="gameOverOverlay">
          <h2 class="game-over-title">GAME OVER</h2>
          <p class="game-over-score" id="finalScore">Score: 0</p>
          <p class="game-over-highscore" id="finalHighScore">Best: 0</p>
          <button class="restart-button" id="restartButton">Restart</button>
        </div>
      </div>
    </div>

    <button class="play-button" id="playButton">Play</button>
  </div>

  <script src="script.js"></script>
</body>

</html>
